# Force the PostgreSQL Dialect so Hibernate doesn't have to guess
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Add a connection timeout to wait longer for Supabase
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Keep your existing AI and DB credentials below...
spring.ai.openai.api-key=${SPRING_AI_GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama3-8b-8192

