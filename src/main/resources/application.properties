# --- CLOUD AI (GROQ) CONFIGURATION ---
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant

# --- CLOUD DATABASE (SUPABASE) CONFIGURATION ---
# 1. THE URL (Only the host and database name)
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require

# 2. THE USERNAME (Specifically for IPv4 Pooler)
spring.datasource.username=postgres.rewjrztuehjsgvxflnmc

# 3. THE PASSWORD (Just the characters, no brackets, no '@' or ':' symbols)
spring.datasource.password=${SUPABASE_PASSWORD}

# 4. THE DRIVER
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect